name: AURA Experiment - fastai/courses (Legacy Keras/Theano)

on:
  workflow_dispatch:

jobs:
  test-fastai-courses:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Setup Agent Deps
        run: pip install google-genai google-api-core pypi-simple packaging pip-tools

      - name: 🧪 1. Run Pip Baseline
        run: |
          python -m venv baseline_env
          source baseline_env/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python validation_fastai.py
          deactivate

      - name: 💥 2. Run Pip Upgrade
        continue-on-error: true
        run: |
          python -m venv upgrade_env
          source upgrade_env/bin/activate
          pip install --upgrade pip
          pip install --upgrade -r primary_requirements.txt
          python validation_fastai.py
          deactivate

      - name: 🤖 Run AURA Agent
        run: |
          python -u dependency_agent.py | tee aura_execution.log
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 📝 Save Full Execution Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-execution-log
          path: aura_execution.log

      - name: Commit Results
        run: |
          git config --global user.name 'AURA Agent'
          git config --global user.email 'aura-agent@users.noreply.github.com'
          git add requirements.txt
          if ! git diff --staged --quiet; then
            git commit -m "chore(deps): Modernized fastai/courses stack [skip ci]"
            git push
          fi
